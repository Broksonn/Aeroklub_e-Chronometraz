version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aeroklub_db
    environment:
      POSTGRES_USER: aeroklub_user
      POSTGRES_PASSWORD: aeroklub_pass
      POSTGRES_DB: aeroklub_db
    ports:
      # Mapujemy port 5434 hosta na 5432 kontenera
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: